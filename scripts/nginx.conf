# Sapphire — Nginx reverse-proxy config
#
# Usage:
#   1. Copy/symlink to /etc/nginx/sites-available/sapphire
#   2. Replace YOUR_DOMAIN with your actual domain
#   3. Replace /path/to/sapphire with the actual project path
#   4. Add NGINX_ACCEL=true to your .env file (enables X-Accel-Redirect)
#   5. Enable:  ln -s /etc/nginx/sites-available/sapphire /etc/nginx/sites-enabled/
#   6. Test:    nginx -t
#   7. Reload:  systemctl reload nginx
#
# For SSL, use certbot:
#   certbot --nginx -d YOUR_DOMAIN

upstream sapphire_backend {
    server 127.0.0.1:3000;

    # Keep persistent connections to Node.js — avoids TCP handshake per request
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

server {
    listen 80;
    listen [::]:80;
    # After certbot, it will add:
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN;

    # --- General ---
    client_max_body_size 50m;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml;

    # --- Next.js static assets (immutable, long-cache) ---
    location /_next/static/ {
        proxy_pass http://sapphire_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- X-Accel-Redirect: nginx serves image files directly from disk ---
    # Node.js returns X-Accel-Redirect header instead of file bytes.
    # This is the single biggest optimization: zero-copy sendfile, no Node memory.
    location /internal-images/ {
        internal;
        alias /path/to/sapphire/data/uploads/;

        tcp_nopush on;
        sendfile_max_chunk 1m;
        access_log off;

        # Cache file descriptors and metadata to avoid repeated stat()/open()
        open_file_cache max=2000 inactive=120s;
        open_file_cache_valid 60s;
        open_file_cache_min_uses 2;
    }

    # --- Image API (auth check goes through Node, file served by nginx) ---
    location /api/images/ {
        proxy_pass http://sapphire_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Buffer the upstream response so Node.js is freed quickly
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;

        # For large originals (up to 50MB)
        proxy_max_temp_file_size 50m;
    }

    # --- Upload endpoint: larger buffers, longer timeout ---
    location /api/gallery/ {
        proxy_pass http://sapphire_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload: don't buffer request body to disk — stream to Node directly
        proxy_request_buffering off;

        # Longer timeouts for large uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # --- Default: all other routes ---
    location / {
        proxy_pass http://sapphire_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for Next.js HMR in dev — harmless in prod)
        proxy_set_header Upgrade $http_upgrade;
    }
}
